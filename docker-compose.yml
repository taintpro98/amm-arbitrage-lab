# Hybrid setup:
# - `anvil`: local EVM JSON-RPC on host :8545
# - `deploy`: one-shot Hardhat deploy after Anvil is healthy (chain state lives in anvil)
#
# From host, Hardhat still targets http://127.0.0.1:8545. Inside compose, use http://anvil:8545.
#
# Auto-deploy uses Anvil's default account #0 private key (local-only). Override with DEPLOY_PRIVATE_KEY.

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://127.0.0.1:8545"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 3s

  deploy:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      LOCAL_RPC_URL: http://anvil:8545
      LOCAL_CHAIN_ID: "31337"
      # Anvil default account #0 — override via .env / shell: DEPLOY_PRIVATE_KEY=0x...
      PRIVATE_KEY: ${DEPLOY_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
    volumes:
      - .:/app
      - amm_node_modules:/app/node_modules
    depends_on:
      anvil:
        condition: service_healthy
    restart: "no"
    command:
      - bash
      - -lc
      - |
        set -e
        if [ -f package-lock.json ]; then npm ci; else npm install; fi
        npx hardhat run scripts/deploy/deployAll.ts --network localhost

volumes:
  amm_node_modules:
